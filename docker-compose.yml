services:
  mysql:
    image: mysql:8.4
    environment:
      MYSQL_DATABASE: campus_system
      MYSQL_USER: campus
      MYSQL_PASSWORD: campus123
      MYSQL_ROOT_PASSWORD: root123
      TZ: Asia/Shanghai
    ports:
      - "3307:3306"
    volumes:
      - campus_mysql:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-proot123"]
      interval: 5s
      timeout: 5s
      retries: 20
  redis:
    image: redis:7.4-alpine
    ports:
      - "6379:6379"
    volumes:
      - campus_redis:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 20
volumes:
  campus_mysql:
  campus_redis:
